<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Club</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>

  <body>
    <main class="open-club container-fluid p-0">
      <div class="sidebar-wrapper">
        <!-- Toggle Button (visible only below 992px) -->
        <div class="sidebar-toggle d-lg-none m-2" id="sidebarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-section">
          <div class="sidebar d-flex flex-column h-100">
            <div class="logo mb-4">
              <a href="./index.html">
                <img
                  src="./assets/images/logo.png"
                  class="img-fluid"
                  alt="Ringside Logo"
                />
              </a>
            </div>
            <p class="sidebar-eyebrow">Menu</p>

            <ul class="sidebar-menu nav flex-column flex-grow-1 gap-2">
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./index.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Dashboard.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Dashboard</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./events.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Events.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Events</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./live-floor.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/LiveFloor.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Live Floor</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./packages.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Packages.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Packages</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./reservations.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Reservations.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Reservations</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./promoters.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Promoters.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Promoters</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./staffs.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Staffs.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Staffs</p>
                </a>
              </li>
              <li class="nav-list nav-item active">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./notifications.html"
                >
                  <div class="btn-wrapper me-2 active">
                    <img
                      class="primary"
                      src="./assets/images/Notifications Select.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text active">Notifications</p>
                </a>
              </li>
            </ul>

            <!-- User Profile Card -->
            <div class="sidebar-user-card mt-auto">
              <div
                class="sidebar-user-profile"
                onclick="window.location.href = 'edit-profile.html'"
                style="cursor: pointer"
              >
                <div class="sidebar-user-avatar">YD</div>
                <div class="sidebar-user-info">
                  <p class="sidebar-user-name">Yasin Daniyal</p>
                  <p class="sidebar-user-post">General Manager</p>
                </div>
              </div>
              <!-- Logout -->
              <button
                class="sidebar-logout-btn"
                onclick="window.location.href = 'login.html'"
                title="Logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Dashboard -->
      <section class="dashboard">
        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar-content">
            <input
              type="text"
              id="search"
              placeholder="Search reservations, guests, promoters..."
            />
          </div>
          <div class="d-flex align-items-center gap-3 notification-wrapper">
            <a href="#" class="btn btn-live"> Live: Throwback Thursday </a>
            <button
              class="action-btn notification-btn"
              id="notification-btn"
              aria-label="Notifications"
            >
              <img
                src="./assets/images/Notifications.png"
                alt="Notifications"
                class="action-icon"
              />
              <span
                class="notification-badge"
                id="notification-badge"
                style="display: flex"
              ></span>
            </button>
          </div>
        </div>
      </section>

      <section class="content dashboard-content notifications-page">
        <div class="events-wrapper">
          <div class="events-header">
            <div class="events-header-content">
              <h1 class="events-title">Notifications</h1>
              <p class="events-subtitle">
                Stay updated with recent activities and alerts.
              </p>
            </div>
            <div class="d-flex align-items-center">
              <button class="btn btn-primary m-0" onclick="markAllAsRead()">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="margin-right: 8px"
                >
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Mark All as Read
              </button>
            </div>
          </div>
        </div>

        <div class="notifications-container mt-4">
          <div class="event-detail-page p-0 m-0 w-100">
            <div class="tabs-nav mt-3 mb-4">
              <span class="tab-item active" onclick="switchFilter('All', this)"
                >All</span
              >
              <span class="tab-item" onclick="switchFilter('Unread', this)"
                >Unread</span
              >
            </div>
          </div>

          <div class="notifications-list" id="notificationsList">
            <!-- Dynamic Notifications -->
          </div>
        </div>
      </section>
    </main>

    <script src="./assets/js/scripts.js"></script>
    <script>
      let notifications = [
        {
          id: 1,
          type: "success",
          title: "Payment Received",
          description:
            "A new payment of $300 was successfully processed for Reservation #4829.",
          time: "10 mins ago",
          unread: true,
        },
        {
          id: 2,
          type: "warning",
          title: "Low Inventory Alert",
          description:
            "Bottle service inventory for 'Dom Perignon' is running low. Only 5 bottles left.",
          time: "2 hours ago",
          unread: true,
        },
        {
          id: 3,
          type: "info",
          title: "Event Update",
          description:
            "The starting time for 'Neon Nights' has been updated to 10:00 PM.",
          time: "Yesterday",
          unread: false,
        },
        {
          id: 4,
          type: "info",
          title: "New Staff Added",
          description:
            "Alex Rivera was successfully added as a new Bottle Service Staff.",
          time: "Yesterday",
          unread: false,
        },
      ];

      let currentFilter = "All";

      const icons = {
        info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
        success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
        warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
      };

      const delIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

      function switchFilter(filter, el) {
        document
          .querySelectorAll(".tab-item")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
        currentFilter = filter;
        renderNotifications();
      }

      function deleteNotification(id) {
        notifications = notifications.filter((n) => n.id !== id);
        renderNotifications();
      }

      function markAllAsRead() {
        notifications.forEach((n) => (n.unread = false));
        renderNotifications();
      }

      function renderNotifications() {
        const listContainer = document.getElementById("notificationsList");
        let displayList = notifications;

        if (currentFilter === "Unread") {
          displayList = notifications.filter((n) => n.unread);
        }

        if (displayList.length === 0) {
          listContainer.innerHTML = `<div class="notification-empty-state">No ${currentFilter === "Unread" ? "unread " : ""}notifications found.</div>`;
          return;
        }

        listContainer.innerHTML = displayList
          .map(
            (n, i) => `
          <div class="notification-card ${n.unread ? "unread" : ""}" style="animation-delay: ${i * 0.05}s">
            <div class="notification-icon ${n.type}">
              ${icons[n.type]}
            </div>
            <div class="notification-content">
              <h3 class="notification-title">${n.title}</h3>
              <p class="notification-desc">${n.description}</p>
              <span class="notification-time">${n.time}</span>
            </div>
            <button class="notification-action" onclick="deleteNotification(${n.id})" title="Delete Notification">
              ${delIcon}
            </button>
          </div>
        `,
          )
          .join("");
      }

      document.addEventListener("DOMContentLoaded", renderNotifications);
    </script>
  </body>
</html>
