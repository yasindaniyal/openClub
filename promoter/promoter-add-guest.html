<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Club</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/host.css" />
    <link rel="stylesheet" href="../assets/css/promoter.css" />
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  </head>

  <body>
    <main class="open-club container-fluid p-0">
      <div class="sidebar-wrapper">
        <!-- Toggle Button (visible only below 992px) -->
        <div class="sidebar-toggle d-lg-none m-2" id="sidebarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-section">
          <div class="sidebar d-flex flex-column h-100">
            <div class="logo mb-4">
              <a href="../index.html">
                <img
                  src="../assets/images/logo.png"
                  class="img-fluid"
                  alt="Ringside Logo"
                />
              </a>
            </div>
            <p class="sidebar-eyebrow">Menu</p>

            <ul class="sidebar-menu nav flex-column flex-grow-1 gap-2">
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-dashboard.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/Dashboard.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Dashboard</p>
                </a>
              </li>

              <li class="nav-list active nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-guest-list.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/guest-list-active.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text active">Guest List</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-referral.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/referral-link.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Referrals</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-earning.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/earning.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Earnings</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-contact.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/contact.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Contacts</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-campaign.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/campaign.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Campaigns</p>
                </a>
              </li>
            </ul>

            <!-- User Profile Card -->
            <div class="sidebar-user-card mt-auto">
              <!-- Avatar & Info -->
              <div
                class="sidebar-user-profile"
                onclick="window.location.href = '../edit-profile.html'"
                style="cursor: pointer"
              >
                <div class="sidebar-user-avatar">YD</div>
                <div class="sidebar-user-info">
                  <p class="sidebar-user-name">Yasin Daniyal</p>
                  <p class="sidebar-user-post">Promoter</p>
                </div>
              </div>

              <!-- Logout -->
              <button
                class="sidebar-logout-btn"
                onclick="window.location.href = '../login.html'"
                title="Logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Dashboard -->
      <section class="dashboard">
        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar-content">
            <input
              type="text"
              id="search"
              placeholder="Search reservations, guests, promoters..."
            />
          </div>
          <div class="d-flex align-items-center gap-3 notification-wrapper">
            <a href="#" class="btn btn-live"> Live: Throwback Thursday </a>
            <button
              class="action-btn notification-btn"
              id="notification-btn"
              aria-label="Notifications"
            >
              <img
                src="../assets/images/Notifications.png"
                alt="Notifications"
                class="action-icon"
              />
              <span
                class="notification-badge"
                id="notification-badge"
                style="display: flex"
              ></span>
            </button>
          </div>
        </div>
      </section>

      <section class="content host-guest-list">
        <!-- Page Titles -->
        <div
          class="title-wrapper d-flex justify-content-between align-items-center"
        >
          <div class="d-flex align-items-center gap-4">
            <button
              class="back-btn"
              onclick="window.location.href = 'promoter-guest-list.html'"
            >
              <svg
                viewBox="0 0 24 24"
                style="
                  width: 20px;
                  height: 20px;
                  fill: none;
                  stroke: currentColor;
                  stroke-width: 2;
                "
              >
                <path d="M19 12H5M12 19l-7-7 7-7"></path>
              </svg>
            </button>
            <div>
              <h1 class="title">Add Guest</h1>
              <p class="subtitle">Add a new guest to your list.</p>
            </div>
          </div>
        </div>

        <!-- Add Guest Section -->
        <!-- Form -->
        <div class="form-card">
          <div id="successToast" class="success-toast">
            ✓ Guest successfully invited! Redirecting...
          </div>

          <form id="addGuestForm" novalidate>
            <div class="form-grid-head">
              <!-- Guest Name -->
              <div class="form-group">
                <label class="field-label" for="guestName">Guest Name</label>
                <input
                  type="text"
                  id="guestName"
                  placeholder="Full Name"
                  required
                />
              </div>

              <!-- Phone -->
              <div class="form-group">
                <label class="field-label" for="phoneNumber"
                  >Phone Number</label
                >
                <input
                  type="tel"
                  id="phoneNumber"
                  placeholder="(555) 000-0000"
                  required
                />
              </div>
            </div>

            <!-- Additional Guests + VIP -->
            <div class="form-grid mt-4">
              <!-- Stepper -->
              <div class="form-group">
                <label class="field-label">Additional Guests</label>
                <div class="stepper-wrapper">
                  <button
                    type="button"
                    class="stepper-btn"
                    id="stepperMinus"
                    aria-label="Decrease"
                  >
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2.5"
                      stroke-linecap="round"
                    >
                      <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                  </button>
                  <span class="stepper-value"
                    >+<span id="stepperVal">0</span></span
                  >
                  <button
                    type="button"
                    class="stepper-btn"
                    id="stepperPlus"
                    aria-label="Increase"
                  >
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2.5"
                      stroke-linecap="round"
                    >
                      <line x1="12" y1="5" x2="12" y2="19" />
                      <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                  </button>
                </div>
                <input type="hidden" id="additionalGuests" value="0" />
              </div>

              <!-- VIP toggle -->
              <div class="form-group">
                <label class="field-label">VIP Status</label>
                <div class="vip-wrapper" id="vipWrapper">
                  <div class="vip-star">
                    <img src="../assets/images/icon-star.png" alt="VIP Star" />
                  </div>
                  <span class="vip-text" id="vipLabel">Standard</span>
                  <input type="checkbox" id="vipStatus" />
                </div>
              </div>
            </div>

            <!-- Notes -->
            <div class="form-group mt-4">
              <label class="field-label" for="notes">Notes (Optional)</label>
              <textarea
                id="notes"
                placeholder="Table preference, special occasions..."
              ></textarea>
            </div>
          </form>
        </div>

        <!-- Fixed Send Button -->
        <div class="send-btn-footer">
          <div class="send-btn-footer-inner">
            <button
              class="send-btn"
              id="submitBtn"
              onclick="handleSubmit(event)"
            >
              <img src="../assets/images/icon-invite.png" alt="Send Invite" />
              <span class="btn-text">Send Invite</span>
              <div class="btn-loader" id="btnLoader"></div>
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="../assets/js/scripts.js"></script>
    <script>
      // ── Stepper ──
      let guestCount = 0;
      const stepperVal = document.getElementById("stepperVal");
      const additionalInput = document.getElementById("additionalGuests");

      document.getElementById("stepperPlus").addEventListener("click", () => {
        if (guestCount < 10) {
          guestCount++;
          stepperVal.textContent = guestCount;
          additionalInput.value = guestCount;
        }
      });
      document.getElementById("stepperMinus").addEventListener("click", () => {
        if (guestCount > 0) {
          guestCount--;
          stepperVal.textContent = guestCount;
          additionalInput.value = guestCount;
        }
      });

      // ── VIP Toggle ──
      const vipWrapper = document.getElementById("vipWrapper");
      const vipStatus = document.getElementById("vipStatus");
      const vipLabel = document.getElementById("vipLabel");
      vipWrapper.addEventListener("click", () => {
        vipStatus.checked = !vipStatus.checked;
        vipWrapper.classList.toggle("active", vipStatus.checked);
        vipLabel.textContent = vipStatus.checked ? "VIP" : "Standard";
      });

      // ── Submit ──
      function handleSubmit(e) {
        e.preventDefault();
        const name = document.getElementById("guestName").value.trim();
        const phone = document.getElementById("phoneNumber").value.trim();
        if (!name || !phone) {
          document.getElementById("guestName").focus();
          return;
        }

        const btn = document.getElementById("submitBtn");
        const loader = document.getElementById("btnLoader");
        const text = btn.querySelector(".btn-text");
        btn.disabled = true;
        loader.style.display = "block";
        text.style.opacity = "0.4";

        setTimeout(() => {
          const newGuest = {
            name,
            phone,
            type: vipStatus.checked ? "VIP" : "",
            noOfGuest: guestCount,
            notes: document.getElementById("notes").value,
            time: "Added just now",
            status: "Pending",
            promoter: "Yasin Daniyal",
          };
          let guests = JSON.parse(
            localStorage.getItem("openClub_guests") || "[]",
          );
          guests.unshift(newGuest);
          localStorage.setItem("openClub_guests", JSON.stringify(guests));

          const toast = document.getElementById("successToast");
          toast.style.display = "block";
          setTimeout(() => {
            window.location.href = "promoter-guest-list.html";
          }, 1500);
        }, 900);
      }
    </script>
  </body>
</html>
