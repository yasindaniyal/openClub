<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Club</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/host.css" />
    <link rel="stylesheet" href="../assets/css/promoter.css" />
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  </head>

  <body>
    <main class="open-club container-fluid p-0">
      <div class="sidebar-wrapper">
        <!-- Toggle Button (visible only below 992px) -->
        <div class="sidebar-toggle d-lg-none m-2" id="sidebarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-section">
          <div class="sidebar d-flex flex-column h-100">
            <div class="logo mb-4">
              <a href="../index.html">
                <img
                  src="../assets/images/logo.png"
                  class="img-fluid"
                  alt="Ringside Logo"
                />
              </a>
            </div>
            <p class="sidebar-eyebrow">Menu</p>

            <ul class="sidebar-menu nav flex-column flex-grow-1 gap-2">
              <li class="nav-list active nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-dashboard.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/Dashboard Select.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text active">Dashboard</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-guest-list.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/guest-list.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Guest List</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-referral.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/referral-link.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Referrals</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-earning.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/earning.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Earnings</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-contact.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/contact.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Contacts</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-campaign.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/campaign.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Campaigns</p>
                </a>
              </li>
            </ul>

            <!-- User Profile Card -->
            <div class="sidebar-user-card mt-auto">
              <!-- Avatar & Info -->
              <div
                class="sidebar-user-profile"
                onclick="window.location.href = '../edit-profile.html'"
                style="cursor: pointer"
              >
                <div class="sidebar-user-avatar">YD</div>
                <div class="sidebar-user-info">
                  <p class="sidebar-user-name">Yasin Daniyal</p>
                  <p class="sidebar-user-post">Promoter</p>
                </div>
              </div>

              <!-- Logout -->
              <button
                class="sidebar-logout-btn"
                onclick="window.location.href = '../login.html'"
                title="Logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Dashboard -->
      <section class="dashboard">
        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar-content">
            <input
              type="text"
              id="search"
              placeholder="Search reservations, guests, promoters..."
            />
          </div>
          <div class="d-flex align-items-center gap-3 notification-wrapper">
            <a href="#" class="btn btn-live"> Live: Throwback Thursday </a>
            <button
              class="action-btn notification-btn"
              id="notification-btn"
              aria-label="Notifications"
            >
              <img
                src="../assets/images/Notifications.png"
                alt="Notifications"
                class="action-icon"
              />
              <span
                class="notification-badge"
                id="notification-badge"
                style="display: flex"
              ></span>
            </button>
          </div>
        </div>
      </section>

      <section class="content host-dashboard">
        <!-- Page Titles -->
        <div class="title-wrapper">
          <h1 class="title">Dashboard</h1>
          <p class="subtitle">Overview of Your Venue's Performance.</p>
        </div>

        <!-- Period Tabs -->
        <div class="period-tabs-wrapper">
          <button class="period-tab active" data-period="today">Today</button>
          <button class="period-tab" data-period="week">This Week</button>
          <button class="period-tab" data-period="month">Month</button>
        </div>

        <!-- Top Cards -->
        <div class="card-group">
          <div class="card">
            <div class="toll-wrapper">
              <div class="btn btn-wrapper btn-card">
                <img
                  class="icon"
                  src="../assets/images/Total-Checked-In.png"
                  alt=""
                />
              </div>
              <div>
                <h3 class="card-title">Total Guests</h3>
              </div>
            </div>
            <div class="card-icon-wrapper m-0">
              <h2 class="toll" id="total-guests-value">45</h2>
              <p class="progress">
                <span
                  ><img src="../assets/images/up-arrow.png" alt="up-arrow" />
                  12%</span
                >
              </p>
            </div>
          </div>
          <div class="card">
            <div class="toll-wrapper">
              <div class="btn btn-wrapper btn-card">
                <img
                  class="icon"
                  src="../assets/images/Total Income.png"
                  alt="Total Income"
                />
              </div>
              <div>
                <h3 class="card-title">Earnings</h3>
              </div>
            </div>
            <div class="card-icon-wrapper m-0">
              <h2 class="toll" id="earnings-value">$1,200</h2>
              <p class="progress">
                <span
                  ><img src="../assets/images/up-arrow.png" alt="up-arrow" />
                  12%</span
                >
              </p>
            </div>
          </div>
        </div>

        <!-- Guest Graph -->

        <div class="revenue-chart-wrapper">
          <div class="revenue-section promoter-revenue-section">
            <div class="revenue-header">
              <h2 class="revenue-title">Guest Trend</h2>
            </div>
            <div class="revenue-chart-container">
              <div id="guestTrendChart"></div>
            </div>
          </div>
        </div>

        <!-- Recent Events -->
        <div class="recent-events-section">
          <div class="section-header">
            <h2 class="section-title">Recent Events</h2>
            <a href="#" class="see-all-link">See all</a>
          </div>
          <div class="event-list" id="recent-events-list">
            <!-- Populated via JavaScript -->
          </div>
        </div>
      </section>
    </main>

    <script src="../assets/js/scripts.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const dashboardData = {
          today: {
            guests: "45",
            earnings: "$1,200",
            chartData: [5, 8, 12, 10, 15, 20, 18, 25, 30, 22, 15, 10],
            categories: [
              "8am",
              "9am",
              "10am",
              "11am",
              "12pm",
              "1pm",
              "2pm",
              "3pm",
              "4pm",
              "5pm",
              "6pm",
              "7pm",
            ],
            yScale: { min: 0, max: 40, tickAmount: 4 },
          },
          week: {
            guests: "400",
            earnings: "$12,450",
            chartData: [45, 52, 38, 65, 48, 72, 80],
            categories: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
            yScale: { min: 0, max: 100, tickAmount: 4 },
          },
          month: {
            guests: "1,850",
            earnings: "$54,200",
            chartData: [400, 450, 500, 500],
            categories: ["Week 1", "Week 2", "Week 3", "Week 4"],
            yScale: { min: 0, max: 600, tickAmount: 4 },
          },
        };

        const recentEventsData = [
          {
            name: "Neon Night",
            date: "20 Oct, 2023",
            guests: 120,
            earnings: "$2,400",
            image: "../assets/images/upcomingEvents.png",
          },
          {
            name: "Jazz Evening",
            date: "18 Oct, 2023",
            guests: 85,
            earnings: "$1,850",
            image: "../assets/images/upcomingEvents.png",
          },
          {
            name: "Summer Bash",
            date: "15 Oct, 2023",
            guests: 210,
            earnings: "$5,200",
            image: "../assets/images/upcomingEvents.png",
          },
        ];

        // Chart Initialization
        const guestTrendChartOptions = {
          series: [
            {
              name: "Guests",
              data: dashboardData.today.chartData,
            },
          ],
          chart: {
            type: "area",
            height: 350,
            toolbar: { show: false },
            fontFamily: "'Helvetica Neue', sans-serif",
            background: "transparent",
            animations: {
              enabled: true,
              easing: "easeinout",
              speed: 600,
            },
          },
          stroke: { curve: "smooth", width: 2, colors: ["#A855F7"] },
          markers: {
            size: 0,
            colors: ["#A855F7"],
            strokeColors: "#fff",
            strokeWidth: 2,
            hover: { size: 6 },
          },
          fill: {
            type: "gradient",
            gradient: {
              shade: "dark",
              type: "vertical",
              shadeIntensity: 0.4,
              gradientToColors: ["#3B0764"],
              opacityFrom: 0.6,
              opacityTo: 0.05,
              stops: [0, 100],
            },
          },
          dataLabels: { enabled: false },
          grid: {
            borderColor: "#1f1f2e",
            strokeDashArray: 0,
            xaxis: { lines: { show: false } },
            yaxis: { lines: { show: true } },
            padding: { left: 10, right: 10 },
          },
          xaxis: {
            categories: dashboardData.today.categories,
            axisBorder: { show: false },
            axisTicks: { show: false },
            labels: { style: { colors: "#6b7280", fontSize: "12px" } },
          },
          yaxis: {
            min: 0,
            max: 40,
            tickAmount: 4,
            labels: {
              style: { colors: "#6b7280", fontSize: "12px" },
              formatter: (val) => val.toLocaleString(),
            },
          },
          tooltip: {
            theme: "dark",
            x: { show: true },
            y: { formatter: (val) => val.toLocaleString() },
          },
          colors: ["#A855F7"],
        };

        const guestTrendChartContainer =
          document.querySelector("#guestTrendChart");
        let guestTrendChart;
        if (guestTrendChartContainer) {
          guestTrendChart = new ApexCharts(
            guestTrendChartContainer,
            guestTrendChartOptions,
          );
          guestTrendChart.render();
        }

        // Render Recent Events
        function renderRecentEvents() {
          const eventList = document.getElementById("recent-events-list");
          if (!eventList) return;

          eventList.innerHTML = recentEventsData
            .map(
              (event) => `
            <div class="event-item">
              <img src="${event.image}" alt="${event.name}" onerror="this.src='https://via.placeholder.com/45'">
              <div class="event-info">
                <div class="event-name">${event.name}</div>
                <div class="event-date">${event.date}</div>
              </div>
              <div class="event-stats">
                <div class="guest-count">${event.guests} Guests</div>
                <div class="earning-amount">${event.earnings}</div>
              </div>
            </div>
          `,
            )
            .join("");
        }

        renderRecentEvents();

        // Handle Tab Switching
        const tabs = document.querySelectorAll(".period-tab");
        const guestsCounter = document.getElementById("total-guests-value");
        const earningsCounter = document.getElementById("earnings-value");

        tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            // Update active state
            tabs.forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");

            const period = tab.getAttribute("data-period");
            const data = dashboardData[period];

            // Update stats
            if (guestsCounter) guestsCounter.innerText = data.guests;
            if (earningsCounter) earningsCounter.innerText = data.earnings;

            // Update chart
            if (guestTrendChart) {
              guestTrendChart.updateOptions({
                xaxis: { categories: data.categories },
                yaxis: {
                  min: data.yScale.min,
                  max: data.yScale.max,
                  tickAmount: data.yScale.tickAmount,
                },
                series: [{ name: "Guests", data: data.chartData }],
              });
            }
          });
        });
      });
    </script>
  </body>
</html>
