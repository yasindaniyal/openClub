<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Club</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/host.css" />
    <link rel="stylesheet" href="../assets/css/promoter.css" />
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  </head>

  <body>
    <main class="open-club container-fluid p-0">
      <div class="sidebar-wrapper">
        <!-- Toggle Button (visible only below 992px) -->
        <div class="sidebar-toggle d-lg-none m-2" id="sidebarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-section">
          <div class="sidebar d-flex flex-column h-100">
            <div class="logo mb-4">
              <a href="../index.html">
                <img
                  src="../assets/images/logo.png"
                  class="img-fluid"
                  alt="Ringside Logo"
                />
              </a>
            </div>
            <p class="sidebar-eyebrow">Menu</p>

            <ul class="sidebar-menu nav flex-column flex-grow-1 gap-2">
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-dashboard.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/Dashboard.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Dashboard</p>
                </a>
              </li>

              <li class="nav-list active nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-guest-list.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/guest-list-active.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text active">Guest List</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-referral.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/referral-link.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Referrals</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-earning.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/earning.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Earnings</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-contact.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/contact.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Contacts</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-campaign.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/campaign.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Campaigns</p>
                </a>
              </li>
            </ul>

            <!-- User Profile Card -->
            <div class="sidebar-user-card mt-auto">
              <!-- Avatar & Info -->
              <div
                class="sidebar-user-profile"
                onclick="window.location.href = '../edit-profile.html'"
                style="cursor: pointer"
              >
                <div class="sidebar-user-avatar">YD</div>
                <div class="sidebar-user-info">
                  <p class="sidebar-user-name">Yasin Daniyal</p>
                  <p class="sidebar-user-post">Promoter</p>
                </div>
              </div>

              <!-- Logout -->
              <button
                class="sidebar-logout-btn"
                onclick="window.location.href = '../login.html'"
                title="Logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Dashboard -->
      <section class="dashboard">
        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar-content">
            <input
              type="text"
              id="search"
              placeholder="Search reservations, guests, promoters..."
            />
          </div>
          <div class="d-flex align-items-center gap-3 notification-wrapper">
            <a href="#" class="btn btn-live"> Live: Throwback Thursday </a>
            <button
              class="action-btn notification-btn"
              id="notification-btn"
              aria-label="Notifications"
            >
              <img
                src="../assets/images/Notifications.png"
                alt="Notifications"
                class="action-icon"
              />
              <span
                class="notification-badge"
                id="notification-badge"
                style="display: flex"
              ></span>
            </button>
          </div>
        </div>
      </section>

      <section class="content host-guest-list">
        <!-- Page Titles -->
        <div
          class="title-wrapper d-flex justify-content-between align-items-center"
        >
          <div>
            <h1 class="title">Guest List</h1>
            <p class="subtitle">Check your Guest List.</p>
          </div>
          <div class="d-flex align-items-center">
            <a href="./promoter-add-guest.html" class="btn btn-primary m-0">
              <img
                class="create-icon"
                src="../assets/images/createIcon.png"
                alt=""
              />
              Add Guest
            </a>
          </div>
        </div>

        <!-- Dashboard Bottom Grid -->
        <div class="dashboard-bottom-grid">
          <!-- Events Table -->
          <div class="dashboard-table">
            <div class="filter-bar">
              <div class="filter-group" style="flex: 1">
                <div class="filter-search">
                  <div class="search-bar-content">
                    <input
                      type="text"
                      id="guest-search"
                      placeholder="Filter by name or promoter..."
                    />
                  </div>
                </div>
              </div>

              <div class="filter-group">
                <div class="filter-tab" id="filter-btn">
                  <img src="../assets/images/Filter.png" alt="Filter" />
                  <span>Filter</span>
                </div>

                <div class="filter-dropdown" id="status-dropdown">
                  <div class="filter-dropdown-item active" data-status="All">
                    All
                  </div>
                  <div class="filter-dropdown-item" data-status="Checked In">
                    Checked In
                  </div>
                  <div class="filter-dropdown-item" data-status="Pending">
                    Pending
                  </div>
                  <div class="filter-dropdown-item" data-status="Declined">
                    Declined
                  </div>
                </div>
              </div>
            </div>

            <div class="table-responsive">
              <div id="guest-list">
                <!-- Placeholder for dynamic rows -->
              </div>
            </div>

            <!-- Pagination Container -->
            <div id="pagination-wrapper">
              <!-- Placeholder for pagination controls -->
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="../assets/js/scripts.js"></script>
    <script>
      const defaultGuestData = [
        {
          name: "Michael Chen",
          type: "",
          promoter: "Sarah Jenkins",
          image: "",
          noOfGuest: "1",
          time: "Added 2h ago",
          status: "Pending",
        },
        {
          name: "Emma Wilson",
          type: "VIP",
          promoter: "Sarah Jenkins",
          image: "",
          noOfGuest: "4",
          time: "Declined",
          status: "Declined",
        },
        {
          name: "David Rodriguez",
          type: "",
          promoter: "Sarah Jenkins",
          image: "",
          noOfGuest: "0",
          time: "10:00 PM",
          status: "Checked In",
        },
        {
          name: "Alex Vance",
          type: "VIP",
          promoter: "Sarah Jenkins",
          image: "",
          noOfGuest: "2",
          time: "10:00 PM",
          status: "Checked In",
        },
      ];

      // Initialize guestData from localStorage or defaults
      let guestData = JSON.parse(localStorage.getItem("openClub_guests"));

      if (!guestData) {
        guestData = defaultGuestData;
        localStorage.setItem("openClub_guests", JSON.stringify(guestData));
      }

      const statusimagesIcon = [
        "../assets/images/check-In.png",
        "../assets/images/pending-icon.png",
        "../assets/images/decline-icon.png",
      ];

      let currentStatusFilter = "All";
      let currentPage = 1;
      const itemsPerPage = 6;

      function renderGuestList(filterText = "", resetPage = false) {
        if (resetPage) currentPage = 1;

        const guestListContainer = document.getElementById("guest-list");
        if (!guestListContainer) return;

        const filteredGuests = guestData.filter((guest) => {
          const matchesSearch =
            guest.name.toLowerCase().includes(filterText.toLowerCase()) ||
            guest.promoter.toLowerCase().includes(filterText.toLowerCase());

          const guestStatus = guest.status || "Checked In";

          let matchesStatus = false;
          if (currentStatusFilter === "All") {
            matchesStatus = true;
          } else if (currentStatusFilter === "Checked In") {
            matchesStatus = guestStatus === "Checked In";
          } else {
            matchesStatus = guestStatus === currentStatusFilter;
          }

          return matchesSearch && matchesStatus;
        });

        const totalItems = filteredGuests.length;
        const totalPages = Math.ceil(totalItems / itemsPerPage);

        // Slice data for pagination
        const start = (currentPage - 1) * itemsPerPage;
        const slicedGuests = filteredGuests.slice(start, start + itemsPerPage);

        if (totalItems === 0) {
          guestListContainer.innerHTML = `
      <div class="p-5 text-center text-muted">
        <p>No guests found matching your search.</p>
      </div>
    `;
          document.getElementById("pagination-wrapper").innerHTML = "";
          return;
        }

        guestListContainer.innerHTML = slicedGuests
          .map((guest, index) => {
            const hasValidImage =
              guest.image &&
              !guest.image.includes("placeholder") &&
              guest.image.trim() !== "";

            const initials = guest.name
              .split(" ")
              .map((n) => n[0])
              .join("")
              .toUpperCase();

            // Status class mapping
            let statusClass = "status-check-in";
            let statusIcon = "";
            const statusText = guest.status || "Checked In";

            if (statusText === "Checked In" || statusText === "Check In") {
              statusClass = "status-checked-in";
              statusIcon = statusimagesIcon[0];
            } else if (statusText === "Pending") {
              statusClass = "status-pending";
              statusIcon = statusimagesIcon[1];
            } else if (statusText === "Declined") {
              statusClass = "status-declined";
              statusIcon = statusimagesIcon[2];
            }

            return `
        <div class="guest-card">
          <div class="guest-card-left">
            <div class="guest-avatar">
              ${
                hasValidImage
                  ? `<img src="${guest.image}" alt="${guest.name}" />`
                  : initials
              }
            </div>
          </div>

          <div class="guest-card-content">
            <div class="guest-card-top">
              <span class="guest-name">${guest.name}</span>
              ${
                guest.type
                  ? `<span class="guest-type">${guest.type}</span>`
                  : ""
              }
            </div>
            <div class="guest-card-bottom">
              <span class="guest-count">+${guest.noOfGuest} Guest${guest.noOfGuest > 1 ? "s" : ""}</span>
              <span class="dot"></span>
              <span class="guest-time">${guest.time}</span>
            </div>
          </div>

          <div class="guest-card-status">
            <span class="status-pill ${statusClass}">
              ${statusIcon ? `<img src="${statusIcon}" alt="" />` : ""}
              ${statusText}
            </span>
          </div>
        </div>
      `;
          })
          .join("");

        renderPagination(totalItems, totalPages);
      }

      function renderPagination(totalItems, totalPages) {
        const paginationWrapper = document.getElementById("pagination-wrapper");
        if (!paginationWrapper || totalItems === 0) return;

        const startItem = (currentPage - 1) * itemsPerPage + 1;
        const endItem = Math.min(currentPage * itemsPerPage, totalItems);

        let pages = [];
        const maxVisiblePages = 7;

        if (totalPages <= maxVisiblePages) {
          for (let i = 1; i <= totalPages; i++) pages.push(i);
        } else {
          // Smart ellipsis logic
          if (currentPage <= 2) {
            pages = [1, 2, 3, "...", totalPages];
          } else if (currentPage >= totalPages - 1) {
            pages = [1, "...", totalPages - 2, totalPages - 1, totalPages];
          } else {
            pages = [
              1,
              "...",
              currentPage - 1,
              currentPage,
              currentPage + 1,
              "...",
              totalPages,
            ];
          }
        }

        const pageNumbersHTML = pages
          .map((p) => {
            if (p === "...") {
              return `<div class="pagination-dot">...</div>`;
            }
            return `
            <div class="page-number ${p === currentPage ? "active" : ""}" onclick="goToPage(${p})">
              ${p}
            </div>
          `;
          })
          .join("");

        paginationWrapper.innerHTML = `
          <div class="pagination-container">
            <div class="pagination-info">
              Showing ${startItem}-${endItem} of ${totalItems} guests
            </div>
            <div class="pagination-controls">
              <button class="pagination-btn" ${currentPage === 1 ? "disabled" : ""} onclick="goToPage(${currentPage - 1})">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
              </button>
              
              <div class="page-numbers">
                ${pageNumbersHTML}
              </div>

              <button class="pagination-btn" ${currentPage === totalPages ? "disabled" : ""} onclick="goToPage(${currentPage + 1})">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
              </button>
            </div>
          </div>
        `;
      }

      function goToPage(page) {
        currentPage = page;
        const currentSearch =
          document.getElementById("guest-search")?.value || "";
        renderGuestList(currentSearch);
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderGuestList();

        const searchInput = document.getElementById("guest-search");
        if (searchInput) {
          searchInput.addEventListener("input", (e) => {
            renderGuestList(e.target.value, true);
          });
        }

        const dashboardSearch = document.getElementById("search");
        if (dashboardSearch) {
          dashboardSearch.addEventListener("input", (e) => {
            renderGuestList(e.target.value, true);
          });
        }

        // Status Filter Dropdown Logic
        const filterBtn = document.getElementById("filter-btn");
        const statusDropdown = document.getElementById("status-dropdown");

        if (filterBtn && statusDropdown) {
          filterBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            statusDropdown.classList.toggle("show");
          });

          // Close dropdown when clicking elsewhere
          document.addEventListener("click", () => {
            statusDropdown.classList.remove("show");
          });

          statusDropdown.addEventListener("click", (e) => {
            if (e.target.classList.contains("filter-dropdown-item")) {
              const items = statusDropdown.querySelectorAll(
                ".filter-dropdown-item",
              );
              items.forEach((item) => item.classList.remove("active"));
              e.target.classList.add("active");

              currentStatusFilter = e.target.getAttribute("data-status");
              const currentSearch =
                document.getElementById("guest-search")?.value || "";
              renderGuestList(currentSearch, true);

              // Update Filter button appearance if filter is active
              if (currentStatusFilter !== "All") {
                filterBtn.classList.add("active");
                filterBtn.querySelector("span").textContent =
                  `Filter: ${currentStatusFilter}`;
              } else {
                filterBtn.classList.remove("active");
                filterBtn.querySelector("span").textContent = "Filter";
              }
            }
          });
        }
      });
    </script>
  </body>
</html>
