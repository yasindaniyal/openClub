<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Club</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/host.css" />
    <link rel="stylesheet" href="../assets/css/promoter.css" />
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  </head>

  <body>
    <main class="open-club container-fluid p-0">
      <div class="sidebar-wrapper">
        <!-- Toggle Button (visible only below 992px) -->
        <div class="sidebar-toggle d-lg-none m-2" id="sidebarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-section">
          <div class="sidebar d-flex flex-column h-100">
            <div class="logo mb-4">
              <a href="../index.html">
                <img
                  src="../assets/images/logo.png"
                  class="img-fluid"
                  alt="Ringside Logo"
                />
              </a>
            </div>
            <p class="sidebar-eyebrow">Menu</p>

            <ul class="sidebar-menu nav flex-column flex-grow-1 gap-2">
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-dashboard.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/Dashboard.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Dashboard</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-guest-list.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/guest-list.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Guest List</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-referral.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/referral-link.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Referrals</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-earning.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/earning.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Earnings</p>
                </a>
              </li>
              <li class="nav-list nav-item active">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-contact.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/contact-select.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text active">Contacts</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="promoter-campaign.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/campaign.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Campaigns</p>
                </a>
              </li>
            </ul>

            <!-- User Profile Card -->
            <div class="sidebar-user-card mt-auto">
              <!-- Avatar & Info -->
              <div
                class="sidebar-user-profile"
                onclick="window.location.href = '../edit-profile.html'"
                style="cursor: pointer"
              >
                <div class="sidebar-user-avatar">YD</div>
                <div class="sidebar-user-info">
                  <p class="sidebar-user-name">Yasin Daniyal</p>
                  <p class="sidebar-user-post">Promoter</p>
                </div>
              </div>

              <!-- Logout -->
              <button
                class="sidebar-logout-btn"
                onclick="window.location.href = '../login.html'"
                title="Logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Dashboard -->
      <section class="dashboard">
        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar-content">
            <input
              type="text"
              id="search"
              placeholder="Search reservations, guests, promoters..."
            />
          </div>
          <div class="d-flex align-items-center gap-3 notification-wrapper">
            <a href="#" class="btn btn-live"> Live: Throwback Thursday </a>
            <button
              class="action-btn notification-btn"
              id="notification-btn"
              aria-label="Notifications"
            >
              <img
                src="../assets/images/Notifications.png"
                alt="Notifications"
                class="action-icon"
              />
              <span
                class="notification-badge"
                id="notification-badge"
                style="display: flex"
              ></span>
            </button>
          </div>
        </div>
      </section>

      <section class="content host-dashboard">
        <!-- ── PAGE HEADER ── -->
        <div class="page-header">
          <div class="title-wrapper m-0">
            <h1 class="title">Audience</h1>
            <p class="subtitle" id="contact-count">248 total contacts</p>
          </div>
          <button class="icon-btn" title="Filter">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
          </button>
        </div>

        <!-- ── SEARCH + FILTER ── -->
        <div class="search-filter-row">
          <div class="search-input-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              class="search-input"
              id="search-input"
              type="text"
              placeholder="Search contacts..."
            />
          </div>
          <button class="filter-btn" title="Filter">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
            </svg>
          </button>
        </div>

        <!-- ── FILTER TABS ── -->
        <div class="filter-tabs" id="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="vip">VIPs</button>
          <button class="filter-tab" data-filter="frequent">Frequent</button>
          <button class="filter-tab" data-filter="new">New</button>
        </div>

        <!-- ── SELECT ALL ── -->
        <div class="select-all-row">
          <label class="cb-wrapper">
            <input type="checkbox" id="select-all-cb" />
            <div class="cb-box">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="10"
                height="10"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#fff"
                stroke-width="3.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </div>
          </label>
          <span
            class="select-all-label"
            onclick="document.getElementById('select-all-cb').click()"
            >Select All</span
          >
        </div>

        <!-- ── CONTACT LIST ── -->
        <div class="contact-list" id="contact-list"></div>
      </section>
    </main>

    <script src="../assets/js/scripts.js"></script>
    <script>
      const contacts = [
        {
          id: 1,
          initials: "AJ",
          name: "Alex Johnson",
          last: "Neon Nights",
          events: 4,
          vip: true,
          tag: "frequent",
        },
        {
          id: 2,
          initials: "AS",
          name: "Amanda Smith",
          last: "Summer Kickoff",
          events: 1,
          vip: false,
          tag: "new",
        },
        {
          id: 3,
          initials: "BD",
          name: "Brian Davis",
          last: "VIP Exclusive",
          events: 8,
          vip: true,
          tag: "frequent",
        },
        {
          id: 4,
          initials: "CW",
          name: "Chloe Wilson",
          last: "Neon Nights",
          events: 2,
          vip: false,
          tag: "new",
        },
        {
          id: 5,
          initials: "DC",
          name: "David Chen",
          last: "Memorial Day Bash",
          events: 5,
          vip: true,
          tag: "frequent",
        },
        {
          id: 6,
          initials: "ET",
          name: "Emma Taylor",
          last: "Summer Kickoff",
          events: 1,
          vip: false,
          tag: "new",
        },
        {
          id: 7,
          initials: "FM",
          name: "Frank Miller",
          last: "Neon Nights",
          events: 3,
          vip: false,
          tag: "frequent",
        },
        {
          id: 8,
          initials: "GH",
          name: "Grace Harris",
          last: "VIP Exclusive",
          events: 6,
          vip: true,
          tag: "vip",
        },
        {
          id: 9,
          initials: "JL",
          name: "James Lee",
          last: "Memorial Day Bash",
          events: 2,
          vip: false,
          tag: "new",
        },
        {
          id: 10,
          initials: "KM",
          name: "Karen Moore",
          last: "Neon Nights",
          events: 9,
          vip: true,
          tag: "vip",
        },
      ];
      let activeFilter = "all";
      let searchQuery = "";
      let selectedIds = new Set();

      function getFiltered() {
        return contacts.filter((c) => {
          const matchFilter =
            activeFilter === "all" ||
            c.tag === activeFilter ||
            (activeFilter === "vip" && c.vip);
          const matchSearch =
            c.name.toLowerCase().includes(searchQuery) ||
            c.last.toLowerCase().includes(searchQuery);
          return matchFilter && matchSearch;
        });
      }

      function renderContacts() {
        const list = document.getElementById("contact-list");
        const filtered = getFiltered();
        document.getElementById("contact-count").textContent =
          `${filtered.length} total contacts`;

        if (!filtered.length) {
          list.innerHTML = `<p style="color:var(--color-text-muted);font-size:13px;padding:20px 0;text-align:center;">No contacts found.</p>`;
          return;
        }

        list.innerHTML = filtered
          .map(
            (c, i) => `
        <div class="contact-item${selectedIds.has(c.id) ? " selected" : ""}" data-index="${i}" onclick="toggleSelect(${c.id}, event)">
          <label class="cb-wrapper" onclick="event.stopPropagation(); toggleSelect(${c.id})">
            <input type="checkbox" ${selectedIds.has(c.id) ? "checked" : ""} readonly />
            <div class="cb-box">
              <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24"
                   fill="none" stroke="#fff" stroke-width="3.5"
                   stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
          </label>
          <div class="contact-avatar">${c.initials}</div>
          <div class="contact-info">
            <div class="contact-name-row">
              <span class="contact-name">${c.name}</span>
              ${
                c.vip
                  ? `
                    <img
                      src="../assets/images/icon-star-active.png"
                      alt="VIP"
                      class="vip-badge"
                    />
                  `
                  : ""
              }
            </div>
            <div class="contact-last">Last: <span>${c.last}</span></div>
          </div>
          <div class="contact-stats">
            <div class="contact-events-count">${c.events}</div>
            <div class="contact-events-label">Events</div>
          </div>
        </div>
      `,
          )
          .join("");
      }

      function toggleSelect(contactId, e) {
        if (e && e.target.closest(".cb-wrapper")) return;

        if (selectedIds.has(contactId)) {
          selectedIds.delete(contactId);
        } else {
          selectedIds.add(contactId);
        }

        syncSelectAll();
        renderContacts();
      }

      function syncSelectAll() {
        const filtered = getFiltered();
        const allSelected =
          filtered.length > 0 && filtered.every((c) => selectedIds.has(c.id));
        document.getElementById("select-all-cb").checked = allSelected;
      }

      // select all
      document
        .getElementById("select-all-cb")
        .addEventListener("change", function () {
          const filtered = getFiltered();
          if (this.checked) filtered.forEach((c) => selectedIds.add(c.id));
          else filtered.forEach((c) => selectedIds.delete(c.id));
          renderContacts();
        });

      // filter tabs
      document.getElementById("filter-tabs").addEventListener("click", (e) => {
        const btn = e.target.closest(".filter-tab");
        if (!btn) return;
        document
          .querySelectorAll(".filter-tab")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        activeFilter = btn.dataset.filter;
        selectedIds.clear();
        renderContacts();
      });

      // search
      document
        .getElementById("search-input")
        .addEventListener("input", function () {
          searchQuery = this.value.toLowerCase().trim();
          selectedIds.clear();
          renderContacts();
        });

      renderContacts();
    </script>
  </body>
</html>
