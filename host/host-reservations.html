<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Club</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/host.css" />
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  </head>

  <body>
    <main class="open-club container-fluid p-0">
      <div class="sidebar-wrapper">
        <!-- Toggle Button (visible only below 992px) -->
        <div class="sidebar-toggle d-lg-none m-2" id="sidebarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-section">
          <div class="sidebar d-flex flex-column h-100">
            <div class="logo mb-4">
              <a href="../index.html">
                <img
                  src="../assets/images/logo.png"
                  class="img-fluid"
                  alt="Ringside Logo"
                />
              </a>
            </div>
            <p class="sidebar-eyebrow">Menu</p>

            <ul class="sidebar-menu nav flex-column flex-grow-1 gap-2">
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="host-dashboard.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/Dashboard.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Dashboard</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="host-guest-list.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/guest-list.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Guest List</p>
                </a>
              </li>

              <li class="nav-list nav-item active">
                <a
                  class="nav-link d-flex align-items-center"
                  href="host-reservations.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/host-reservations_select.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text active">Reservations</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="host-scanner.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/Scanner.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Scanner</p>
                </a>
              </li>
            </ul>

            <!-- User Profile Card -->
            <div class="sidebar-user-card mt-auto">
              <!-- Avatar & Info -->
              <div
                class="sidebar-user-profile"
                onclick="window.location.href = '../edit-profile.html'"
                style="cursor: pointer"
              >
                <div class="sidebar-user-avatar">YD</div>
                <div class="sidebar-user-info">
                  <p class="sidebar-user-name">Yasin Daniyal</p>
                  <p class="sidebar-user-post">Host</p>
                </div>
              </div>

              <!-- Logout -->
              <button
                class="sidebar-logout-btn"
                onclick="window.location.href = '../login.html'"
                title="Logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Dashboard -->
      <section class="dashboard">
        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar-content">
            <input
              type="text"
              id="search"
              placeholder="Search reservations, guests, promoters..."
            />
          </div>
          <div class="d-flex align-items-center gap-3 notification-wrapper">
            <a href="#" class="btn btn-live"> Live: Throwback Thursday </a>
            <button
              class="action-btn notification-btn"
              id="notification-btn"
              aria-label="Notifications"
            >
              <img
                src="../assets/images/Notifications.png"
                alt="Notifications"
                class="action-icon"
              />
              <span
                class="notification-badge"
                id="notification-badge"
                style="display: flex"
              ></span>
            </button>
          </div>
        </div>
      </section>

      <section class="content host-reservations">
        <!-- Page Titles -->
        <div
          class="title-wrapper d-flex justify-content-between align-items-center"
        >
          <div>
            <h1 class="title">Guest List</h1>
            <p class="subtitle">Check your Guest List.</p>
          </div>
        </div>

        <!-- Dashboard Bottom Grid -->
        <div class="dashboard-bottom-grid">
          <!-- Events Table -->
          <div class="dashboard-table">
            <div class="filter-bar">
              <div class="filter-group" style="flex: 1">
                <div class="filter-search">
                  <div class="search-bar-content">
                    <input
                      type="text"
                      id="guest-search"
                      placeholder="Filter by name or promoter..."
                    />
                  </div>
                </div>
              </div>

              <div class="filter-group">
                <div class="filter-tab">
                  <img src="../assets/images/Filter.png" alt="Filter" />
                  <span>Filter</span>
                </div>
              </div>
            </div>

            <div class="host-reservations-group" id="reservations-list">
              <!-- Cards rendered by JS -->
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="../assets/js/scripts.js"></script>
    <script>
      // ─── Data ────────────────────────────────────────────────────────────────
      const reservationsData = [
        {
          group: "David Ross Group",
          time: "10:30 PM",
          section: "VIP Booth 1",
          package: "Premium",
          maxGuests: 8,
          status: "expected",
        },
        {
          group: "Martinez & Friends",
          time: "09:00 PM",
          section: "Main Floor Table 3",
          package: "Standard",
          maxGuests: 6,
          status: "expected",
        },
        {
          group: "Chen Party of 4",
          time: "11:00 PM",
          section: "VIP Booth 2",
          package: "Bottle Service",
          maxGuests: 4,
          status: "expected",
        },
        {
          group: "The Williams Crew",
          time: "08:30 PM",
          section: "Lounge Section A",
          package: "Premium",
          maxGuests: 10,
          status: "expected",
        },
        {
          group: "Johnson Bachelorette",
          time: "10:00 PM",
          section: "VIP Booth 3",
          package: "Elite Package",
          maxGuests: 12,
          status: "expected",
        },
        {
          group: "Patel Group",
          time: "09:30 PM",
          section: "Main Floor Table 7",
          package: "Standard",
          maxGuests: 5,
          status: "expected",
        },
      ];

      // ─── Wine icon SVG ────────────────────────────────────────────────────────
      const wineSVG = `<img src="../assets/images/Tables-Seated1.png" alt="Tables Seated" />`;

      // ─── Render ───────────────────────────────────────────────────────────────
      function renderReservations(filterText = "") {
        const container = document.getElementById("reservations-list");
        if (!container) return;

        const q = filterText.toLowerCase();
        const filtered = reservationsData.filter(
          (r) =>
            r.group.toLowerCase().includes(q) ||
            r.section.toLowerCase().includes(q) ||
            r.package.toLowerCase().includes(q),
        );

        if (filtered.length === 0) {
          container.innerHTML = `
            <div class="p-5 text-center text-muted" style="grid-column:1/-1">
              <p>No reservations found matching your search.</p>
            </div>`;
          return;
        }

        container.innerHTML = filtered
          .map(
            (r) => `
          <div class="host-reservations-card">
            <div class="card-header">
              <div class="card-header-left">
                <div class="d-flex align-items-center justify-content-between gap-2 flex-wrap">
                  <span class="badge-expected">EXPECTED</span>
                  <span class="card-time">${r.time}</span>
                </div>
                <div class="card-title">${r.group}</div>
              </div>
              <div class="icon-wine">${wineSVG}</div>
            </div>
            <div class="card-info">
              <div class="card-info-item">
                <span class="info-label">Section</span>
                <span class="info-value">${r.section}</span>
              </div>
              <div class="card-info-item">
                <span class="info-label">Package</span>
                <span class="info-value">${r.package}</span>
              </div>
              <div class="card-info-item">
                <span class="info-label">Guests</span>
                <span class="info-value">${r.maxGuests} Max</span>
              </div>
            </div>
            <div class="card-actions">
              <button class="btn-no-show" onclick="handleNoShow(this)">No Show</button>
              <button class="btn-mark-arrived" onclick="handleArrived(this)">Mark Arrived</button>
            </div>
          </div>`,
          )
          .join("");
      }

      // ─── Action Handlers ──────────────────────────────────────────────────────
      function handleArrived(btn) {
        const actions = btn.closest(".card-actions");
        actions.innerHTML =
          '<button class="btn-reset-status" onclick="handleReset(this)">Reset Status</button>';
      }

      function handleNoShow(btn) {
        const card = btn.closest(".host-reservations-card");
        const badge = card.querySelector(".badge-expected");
        badge.textContent = "NO SHOW";
        badge.style.background = "rgba(180,40,40,0.2)";
        badge.style.color = "#f87171";
        badge.style.borderColor = "rgba(248,113,113,0.2)";
        const actions = btn.closest(".card-actions");
        actions.innerHTML =
          '<button class="btn-reset-status" onclick="handleReset(this)">Reset Status</button>';
      }

      function handleReset(btn) {
        const card = btn.closest(".host-reservations-card");
        const badge = card.querySelector(".badge-expected");
        badge.textContent = "EXPECTED";
        badge.style.background = "";
        badge.style.color = "";
        badge.style.borderColor = "";
        const actions = btn.closest(".card-actions");
        actions.innerHTML = `
          <button class="btn-no-show" onclick="handleNoShow(this)">No Show</button>
          <button class="btn-mark-arrived" onclick="handleArrived(this)">Mark Arrived</button>
        `;
      }

      // ─── Init ─────────────────────────────────────────────────────────────────
      document.addEventListener("DOMContentLoaded", () => {
        renderReservations();

        const searchInput = document.getElementById("guest-search");
        if (searchInput) {
          searchInput.addEventListener("input", (e) => {
            renderReservations(e.target.value);
          });
        }
      });
    </script>
  </body>
</html>
