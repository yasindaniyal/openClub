<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Club</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/host.css" />
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  </head>

  <body>
    <main class="open-club container-fluid p-0">
      <div class="sidebar-wrapper">
        <!-- Toggle Button (visible only below 992px) -->
        <div class="sidebar-toggle d-lg-none m-2" id="sidebarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-section">
          <div class="sidebar d-flex flex-column h-100">
            <div class="logo mb-4">
              <a href="../index.html">
                <img
                  src="../assets/images/logo.png"
                  class="img-fluid"
                  alt="Ringside Logo"
                />
              </a>
            </div>
            <p class="sidebar-eyebrow">Menu</p>

            <ul class="sidebar-menu nav flex-column flex-grow-1 gap-2">
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="host-dashboard.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/Dashboard.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Dashboard</p>
                </a>
              </li>

              <li class="nav-list active nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="host-guest-list.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/guest-list-active.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text active">Guest List</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="host-reservations.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/host-reservations.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Reservations</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="host-scanner.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="../assets/images/Scanner.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Scanner</p>
                </a>
              </li>
            </ul>

            <!-- User Profile Card -->
            <div class="sidebar-user-card mt-auto">
              <!-- Avatar & Info -->
              <div
                class="sidebar-user-profile"
                onclick="window.location.href = '../edit-profile.html'"
                style="cursor: pointer"
              >
                <div class="sidebar-user-avatar">YD</div>
                <div class="sidebar-user-info">
                  <p class="sidebar-user-name">Yasin Daniyal</p>
                  <p class="sidebar-user-post">Host</p>
                </div>
              </div>

              <!-- Logout -->
              <button
                class="sidebar-logout-btn"
                onclick="window.location.href = '../login.html'"
                title="Logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Dashboard -->
      <section class="dashboard">
        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar-content">
            <input
              type="text"
              id="search"
              placeholder="Search reservations, guests, promoters..."
            />
          </div>
          <div class="d-flex align-items-center gap-3 notification-wrapper">
            <a href="#" class="btn btn-live"> Live: Throwback Thursday </a>
            <button
              class="action-btn notification-btn"
              id="notification-btn"
              aria-label="Notifications"
            >
              <img
                src="../assets/images/Notifications.png"
                alt="Notifications"
                class="action-icon"
              />
              <span
                class="notification-badge"
                id="notification-badge"
                style="display: flex"
              ></span>
            </button>
          </div>
        </div>
      </section>

      <section class="content host-guest-list">
        <!-- Page Titles -->
        <div
          class="title-wrapper d-flex justify-content-between align-items-center"
        >
          <div>
            <h1 class="title">Guest List</h1>
            <p class="subtitle">Check your Guest List.</p>
          </div>
        </div>

        <!-- Dashboard Bottom Grid -->
        <div class="dashboard-bottom-grid">
          <!-- Events Table -->
          <div class="dashboard-table">
            <div class="filter-bar">
              <div class="filter-group" style="flex: 1">
                <div class="filter-search">
                  <div class="search-bar-content">
                    <input
                      type="text"
                      id="guest-search"
                      placeholder="Filter by name or promoter..."
                    />
                  </div>
                </div>
              </div>

              <div class="filter-group">
                <div class="filter-tab">
                  <img src="../assets/images/Filter.png" alt="Filter" />
                  <span>Filter</span>
                </div>
              </div>
            </div>

            <div class="table-responsive">
              <div class="dashboard-table-header">
                <div class="dashboard-table-header-cell">Guest Name</div>
                <div class="dashboard-table-header-cell">Type</div>
                <div class="dashboard-table-header-cell">Promoter</div>
                <div class="dashboard-table-header-cell">No. of Guests</div>
                <div class="dashboard-table-header-cell">Actions</div>
              </div>

              <div id="guest-list">
                <!-- Placeholder for dynamic rows -->
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="../assets/js/scripts.js"></script>
    <script>
      const guestData = [
        {
          name: "Alex Vance",
          type: "VIP",
          promoter: "Sarah Jenkins",
          image: "",
          noOfGuest: "2",
        },
        {
          name: "Michael Chen",
          type: "VIP",
          promoter: "Sarah Jenkins",
          image: "",
          noOfGuest: "2",
        },
        {
          name: "Emma Wilson",
          type: "VIP",
          promoter: "Sarah Jenkins",
          image: "",
          noOfGuest: "2",
        },
        {
          name: "David Rodriguez",
          type: "VIP",
          promoter: "Sarah Jenkins",
          image: "",
          noOfGuest: "2",
        },
      ];

      function renderGuestList(filterText = "") {
        const guestListContainer = document.getElementById("guest-list");
        if (!guestListContainer) return;

        const filteredGuests = guestData.filter(
          (guest) =>
            guest.name.toLowerCase().includes(filterText.toLowerCase()) ||
            guest.promoter.toLowerCase().includes(filterText.toLowerCase()),
        );

        if (filteredGuests.length === 0) {
          guestListContainer.innerHTML = `
      <div class="p-5 text-center text-muted">
        <p>No guests found matching your search.</p>
      </div>
    `;
          return;
        }

        guestListContainer.innerHTML = filteredGuests
          .map((guest, index) => {
            const hasValidImage =
              guest.image &&
              !guest.image.includes("placeholder") &&
              guest.image.trim() !== "";

            return `
        <div class="dashboard-table-row">
          <div class="dashboard-table-cell">
            <div class="guest-info">

              ${
                hasValidImage
                  ? `<img src="${guest.image}" class="guest-avatar" alt="${guest.name}" />`
                  : `<div class="guest-avatar">
        ${guest.name.trim()[0].toUpperCase()}
      </div>`
              }

              <span class="guest-name m-0">${guest.name}</span>
            </div>
          </div>

          <div class="dashboard-table-cell">
            <span class="status-pill status-confirmed">${guest.type}</span>
          </div>

          <div class="dashboard-table-cell text-muted">
            ${guest.promoter}
          </div>

          <div class="dashboard-table-cell">
            <span class="">+${guest.noOfGuest}</span>
          </div>

          <div class="dashboard-table-cell">
            <div class="status">
              <span class="status-pill status-confirmed">Check In</span>
            </div>
          </div>
        </div>
      `;
          })
          .join("");
      }
      document.addEventListener("DOMContentLoaded", () => {
        renderGuestList();

        const searchInput = document.getElementById("guest-search");
        if (searchInput) {
          searchInput.addEventListener("input", (e) => {
            renderGuestList(e.target.value);
          });
        }
      });
    </script>
  </body>
</html>
