<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Club</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>

  <body>
    <main class="open-club container-fluid p-0">
      <div class="sidebar-wrapper">
        <!-- Toggle Button (visible only below 992px) -->
        <div class="sidebar-toggle d-lg-none m-2" id="sidebarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-section">
          <div class="sidebar d-flex flex-column h-100">
            <div class="logo mb-4">
              <a href="./index.html">
                <img
                  src="./assets/images/logo.png"
                  class="img-fluid"
                  alt="Ringside Logo"
                />
              </a>
            </div>
            <p class="sidebar-eyebrow">Menu</p>

            <ul class="sidebar-menu nav flex-column flex-grow-1 gap-2">
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./index.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Dashboard.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Dashboard</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./events.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Events.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Events</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./live-floor.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/LiveFloor.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Live Floor</p>
                </a>
              </li>

              <li class="nav-list nav-item active">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./packages.html"
                >
                  <div class="btn-wrapper me-2 active">
                    <img
                      class="primary"
                      src="./assets/images/Packages Select.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text active">Packages</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./reservations.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Reservations.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Reservations</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./promoters.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Promoters.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Promoters</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./staffs.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Staffs.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Staffs</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./notifications.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Notifications.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Notifications</p>
                </a>
              </li>
            </ul>

            <!-- User Profile Card -->
            <div class="sidebar-user-card mt-auto">
              <div
                class="sidebar-user-profile"
                onclick="window.location.href = 'edit-profile.html'"
                style="cursor: pointer"
              >
                <div class="sidebar-user-avatar">YD</div>
                <div class="sidebar-user-info">
                  <p class="sidebar-user-name">Yasin Daniyal</p>
                  <p class="sidebar-user-post">General Manager</p>
                </div>
              </div>
              <!-- Logout -->
              <button
                class="sidebar-logout-btn"
                onclick="window.location.href = 'login.html'"
                title="Logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Dashboard -->
      <section class="dashboard">
        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar-content">
            <input
              type="text"
              id="search"
              placeholder="Search reservations, guests, promoters..."
            />
          </div>
          <div class="d-flex align-items-center gap-3 notification-wrapper">
            <a href="#" class="btn btn-live"> Live: Throwback Thursday </a>
            <button
              class="action-btn notification-btn"
              id="notification-btn"
              aria-label="Notifications"
            >
              <img
                src="./assets/images/Notifications.png"
                alt="Notifications"
                class="action-icon"
              />
              <span
                class="notification-badge"
                id="notification-badge"
                style="display: flex"
              ></span>
            </button>
          </div>
        </div>
      </section>

      <!-- Packages -->
      <section class="content packages dashboard-content">
        <!-- Header -->
        <div class="events-wrapper">
          <div class="events-header">
            <div class="title-wrapper events-header-content">
              <h1 class="title">Bottle Packages</h1>
              <p class="subtitle">
                Manage your VIP and bottle service offerings
              </p>
            </div>
            <div class="d-flex align-items-center ms-auto">
              <button class="btn btn-primary m-0" id="btnCreate">
                <img
                  class="create-icon"
                  src="./assets/images/createIcon.png"
                  alt=""
                />
                Create Package
              </button>
            </div>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="dashboard-table">
          <div class="filter-bar m-0">
            <div class="filter-group" style="flex: 1">
              <div class="filter-search">
                <div class="search-bar-content">
                  <input
                    type="text"
                    id="searchInput"
                    placeholder="Search packages..."
                  />
                </div>
              </div>
            </div>

            <div class="filter-group">
              <div class="date-input-wrapper packages-filter-wrapper">
                <select id="priceFilter" class="packages-price-filter">
                  <option value="">All Prices</option>
                  <option value="low">Under $5,000</option>
                  <option value="mid">$5,000 – $10,000</option>
                  <option value="high">Over $10,000</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Cards -->
        <div class="member-card">
          <div class="cards-grid" id="cardsGrid"></div>
        </div>

        <!-- Modal -->
        <div class="modal-overlay" id="modalOverlay">
          <div class="pkg-modal">
            <h3 id="modalTitle">Create Package</h3>
            <div class="form-group">
              <label>Package Name</label>
              <input type="text" id="fName" placeholder="e.g. Gold Tier" />
            </div>
            <div class="form-group">
              <label>Description</label>
              <input
                type="text"
                id="fDesc"
                placeholder="e.g. Standard VIP experience"
              />
            </div>
            <div class="form-group">
              <label>Price</label>
              <input type="number" id="fPrice" placeholder="5000" />
            </div>
            <div class="form-group">
              <label>Includes</label>
              <div class="items-input-list" id="itemsList"></div>
              <button class="btn-add-item" id="btnAddItem">+ Add Item</button>
            </div>
            <div class="modal-footer">
              <button class="btn-cancel" id="btnCancel">Cancel</button>
              <button class="btn-save" id="btnSave">Save Package</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./assets/js/scripts.js"></script>
    <script>
      // ── State ──
      let packages = [
        {
          id: 1,
          name: "Silver Tier",
          desc: "Entry level bottle service",
          price: 5000,
          items: [
            "5 Premium Bottles",
            "3 Dom Perignon",
            "Red Bull",
            "VIP Entry for 15",
            "Personal Security",
          ],
        },
        {
          id: 2,
          name: "Gold Tier",
          desc: "Standard VIP experience",
          price: 5000,
          items: [
            "5 Premium Bottles",
            "3 Dom Perignon",
            "Red Bull",
            "VIP Entry for 15",
            "Personal Security",
          ],
        },
        {
          id: 3,
          name: "Platinum Tier",
          desc: "Ultimate baller package",
          price: 5000,
          items: [
            "5 Premium Bottles",
            "3 Dom Perignon",
            "Red Bull",
            "VIP Entry for 15",
            "Personal Security",
          ],
        },
      ];
      let nextId = 4;
      let editingId = null;

      // ── Icons ──
      const editIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
      const delIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
      const checkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

      // ── Render ──
      function getFiltered() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const p = document.getElementById("priceFilter").value;
        return packages.filter((pkg) => {
          const matchQ =
            pkg.name.toLowerCase().includes(q) ||
            pkg.desc.toLowerCase().includes(q);
          const matchP =
            !p ||
            (p === "low" && pkg.price < 5000) ||
            (p === "mid" && pkg.price >= 5000 && pkg.price <= 10000) ||
            (p === "high" && pkg.price > 10000);
          return matchQ && matchP;
        });
      }

      function render() {
        const grid = document.getElementById("cardsGrid");
        const items = getFiltered();
        if (!items.length) {
          grid.innerHTML = '<div class="empty-state">No packages found.</div>';
          return;
        }
        grid.innerHTML = items
          .map(
            (pkg, i) => `
        <div class="pkg-card" style="animation-delay:${i * 0.07}s;">
          <div class="card-top">
            <div>
              <h2>${pkg.name}</h2>
              <p>${pkg.desc}</p>
            </div>
            <div class="card-actions">
              <button class="icon-btn" onclick="openEdit(${pkg.id})" title="Edit">${editIcon}</button>
              <button class="icon-btn del" onclick="deletePackage(${pkg.id})" title="Delete">${delIcon}</button>
            </div>
          </div>
          <div class="card-price">$${pkg.price.toLocaleString()}</div>
          <hr class="card-divider"/>

          <div class="includes-label">Includes</div>
          <ul class="items-list">
            ${pkg.items.map((it) => `<li>${checkIcon} ${it}</li>`).join("")}
          </ul>
        </div>
      `,
          )
          .join("");
      }

      // ── Modal ──
      function openModal(pkg = null) {
        editingId = pkg ? pkg.id : null;
        document.getElementById("modalTitle").textContent = pkg
          ? "Edit Package"
          : "Create Package";
        document.getElementById("fName").value = pkg ? pkg.name : "";
        document.getElementById("fDesc").value = pkg ? pkg.desc : "";
        document.getElementById("fPrice").value = pkg ? pkg.price : "";
        buildItemInputs(pkg ? [...pkg.items] : [""]);
        document.getElementById("modalOverlay").classList.add("open");
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
        editingId = null;
      }

      function buildItemInputs(items) {
        const list = document.getElementById("itemsList");
        list.innerHTML = items
          .map(
            (it, i) => `
        <div class="item-row">
          <input type="text" value="${it}" placeholder="Item ${i + 1}" data-idx="${i}"/>
          <button onclick="removeItem(${i})">×</button>
        </div>
      `,
          )
          .join("");
      }

      function removeItem(idx) {
        const inputs = [...document.querySelectorAll("#itemsList input")];
        const vals = inputs.map((i) => i.value);
        vals.splice(idx, 1);
        buildItemInputs(vals.length ? vals : [""]);
      }

      document.getElementById("btnAddItem").addEventListener("click", () => {
        const inputs = [...document.querySelectorAll("#itemsList input")];
        buildItemInputs([...inputs.map((i) => i.value), ""]);
      });

      document.getElementById("btnSave").addEventListener("click", () => {
        const name = document.getElementById("fName").value.trim();
        const desc = document.getElementById("fDesc").value.trim();
        const price = parseFloat(document.getElementById("fPrice").value);
        const items = [...document.querySelectorAll("#itemsList input")]
          .map((i) => i.value.trim())
          .filter(Boolean);

        if (!name || isNaN(price)) {
          document.getElementById("fName").style.borderColor = !name
            ? "#ef4444"
            : "";
          document.getElementById("fPrice").style.borderColor = isNaN(price)
            ? "#ef4444"
            : "";
          return;
        }

        if (editingId !== null) {
          const pkg = packages.find((p) => p.id === editingId);
          if (pkg) Object.assign(pkg, { name, desc, price, items });
        } else {
          packages.push({ id: nextId++, name, desc, price, items });
        }
        closeModal();
        render();
      });

      document
        .getElementById("btnCancel")
        .addEventListener("click", closeModal);
      document.getElementById("modalOverlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      // ── Actions ──
      function openEdit(id) {
        openModal(packages.find((p) => p.id === id));
      }

      function deletePackage(id) {
        packages = packages.filter((p) => p.id !== id);
        render();
      }

      document
        .getElementById("btnCreate")
        .addEventListener("click", () => openModal());
      document.getElementById("searchInput").addEventListener("input", render);
      document.getElementById("priceFilter").addEventListener("change", render);

      // ── Init ──
      render();
    </script>
  </body>
</html>
