<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Club</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>

  <body>
    <main class="open-club container-fluid p-0">
      <div class="sidebar-wrapper">
        <!-- Toggle Button (visible only below 992px) -->
        <div class="sidebar-toggle d-lg-none m-2" id="sidebarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-section">
          <div class="sidebar d-flex flex-column h-100">
            <div class="logo mb-4">
              <a href="./index.html">
                <img
                  src="./assets/images/logo.png"
                  class="img-fluid"
                  alt="Ringside Logo"
                />
              </a>
            </div>
            <p class="sidebar-eyebrow">Menu</p>

            <ul class="sidebar-menu nav flex-column flex-grow-1 gap-2">
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./index.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Dashboard.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Dashboard</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./events.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Events.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Events</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./live-floor.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/LiveFloor.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Live Floor</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./packages.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Packages.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Packages</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./reservations.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Reservations.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Reservations</p>
                </a>
              </li>

              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./promoters.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Promoters.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Promoters</p>
                </a>
              </li>

              <li class="nav-list nav-item active">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./staffs.html"
                >
                  <div class="btn-wrapper me-2 active">
                    <img
                      class="primary"
                      src="./assets/images/Staffs Select.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text active">Staffs</p>
                </a>
              </li>
              <li class="nav-list nav-item">
                <a
                  class="nav-link d-flex align-items-center"
                  href="./notifications.html"
                >
                  <div class="btn-wrapper me-2">
                    <img
                      class="primary"
                      src="./assets/images/Notifications.png"
                      alt=""
                    />
                  </div>
                  <p class="m-0 link-text">Notifications</p>
                </a>
              </li>
            </ul>

            <!-- User Profile Card -->
            <div class="sidebar-user-card mt-auto">
              <div
                class="sidebar-user-profile"
                onclick="window.location.href = 'edit-profile.html'"
                style="cursor: pointer"
              >
                <div class="sidebar-user-avatar">YD</div>
                <div class="sidebar-user-info">
                  <p class="sidebar-user-name">Yasin Daniyal</p>
                  <p class="sidebar-user-post">General Manager</p>
                </div>
              </div>
              <!-- Logout -->
              <button
                class="sidebar-logout-btn"
                onclick="window.location.href = 'login.html'"
                title="Logout"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Dashboard -->
      <section class="dashboard">
        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar-content">
            <input
              type="text"
              id="search"
              placeholder="Search reservations, guests, promoters..."
            />
          </div>
          <div class="d-flex align-items-center gap-3 notification-wrapper">
            <a href="#" class="btn btn-live"> Live: Throwback Thursday </a>
            <button
              class="action-btn notification-btn"
              id="notification-btn"
              aria-label="Notifications"
            >
              <img
                src="./assets/images/Notifications.png"
                alt="Notifications"
                class="action-icon"
              />
              <span class="notification-badge" id="notification-badge"></span>
            </button>
          </div>
        </div>
      </section>

      <section class="content staffs dashboard-content">
        <!-- Header -->
        <div class="events-wrapper">
          <div class="events-header">
            <div class="title-wrapper events-header-content">
              <h1 class="title">Staffs</h1>
              <p class="subtitle">Manage Staff Performance</p>
            </div>
            <div class="d-flex align-items-center ms-auto">
              <button class="btn btn-primary m-0" id="btnCreate">
                <img
                  class="create-icon"
                  src="./assets/images/createIcon.png"
                  alt=""
                />
                Add Staff
              </button>
            </div>
          </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="event-detail-page p-0 m-0 w-100">
          <div class="tabs-nav mt-3 mb-4">
            <span
              class="tab-item active"
              onclick="switchCategory('Bottle Service Staff', this)"
              >Bottle Service Staff</span
            >
            <span class="tab-item" onclick="switchCategory('Door Staff', this)"
              >Door Staff</span
            >
          </div>
        </div>

        <!-- Toolbar -->
        <div class="dashboard-table">
          <div class="filter-bar m-0">
            <div class="filter-group w-100">
              <div class="filter-search">
                <div class="search-bar-content">
                  <input
                    type="text"
                    id="searchInput"
                    placeholder="Search Staffs..."
                  />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Cards -->
        <div class="member-card">
          <div class="cards-grid" id="cardsGrid"></div>
        </div>

        <!-- Modal -->
        <div class="modal-overlay" id="modalOverlay">
          <div class="pkg-modal">
            <h3 id="modalTitle">Create Staff</h3>
            <div class="form-row">
              <div class="form-group form-group-flex">
                <label>First Name</label>
                <input type="text" id="fFirst" placeholder="e.g. Alex" />
              </div>
              <div class="form-group form-group-flex">
                <label>Last Name</label>
                <input type="text" id="fLast" placeholder="e.g. Rivera" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group form-group-flex">
                <label>Contact Number</label>
                <input
                  type="text"
                  id="fContact"
                  placeholder="e.g. 123-456-7890"
                />
              </div>
              <div class="form-group form-group-flex">
                <label>Status</label>
                <select
                  id="fStatus"
                  class="revenue-select w-100 fStatus-select"
                >
                  <option value="Upcoming">Upcoming</option>
                  <option value="Active">Active</option>
                  <option value="Inactive">Inactive</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group form-group-flex">
                <label>Total Shifts</label>
                <input type="number" id="fShifts" placeholder="0" />
              </div>
              <div class="form-group form-group-flex">
                <label>Total Pay ($)</label>
                <input type="number" id="fPay" placeholder="0.00" />
              </div>
              <div class="form-group form-group-flex">
                <label>Hourly Rate ($)</label>
                <input type="number" id="fRate" placeholder="15" />
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn-cancel" id="btnCancel">Cancel</button>
              <button class="btn-save" id="btnSave">Save Staff</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./assets/js/scripts.js"></script>
    <script>
      const editIcon = `<img src="./assets/images/edit.png" alt="Edit">`;

      const delIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

      const guestsIcon = `<img src="./assets/images/total-guests.png" alt="Total Guests">`;

      const revenueIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`;

      const medalIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>`;

      let currentCategory = "Bottle Service Staff";

      let staffs = [
        {
          id: 1,
          category: "Bottle Service Staff",
          first: "Alex",
          last: "Rivera",
          contact: "123-456-7890",
          status: "Active",
          shifts: 45,
          pay: 2250,
          rate: 20,
        },
        {
          id: 2,
          category: "Bottle Service Staff",
          first: "Jessica",
          last: "Wong",
          contact: "987-654-3210",
          status: "Upcoming",
          shifts: 30,
          pay: 1500,
          rate: 20,
        },
        {
          id: 3,
          category: "Bottle Service Staff",
          first: "Jessica",
          last: "Wong",
          contact: "987-654-3210",
          status: "Upcoming",
          shifts: 30,
          pay: 1500,
          rate: 20,
        },
        {
          id: 4,
          category: "Door Staff",
          first: "Marcus",
          last: "Johnson",
          contact: "555-123-4567",
          status: "Inactive",
          shifts: 60,
          pay: 3000,
          rate: 18,
        },
        {
          id: 5,
          category: "Door Staff",
          first: "Marcus",
          last: "Johnson",
          contact: "555-123-4567",
          status: "Inactive",
          shifts: 60,
          pay: 3000,
          rate: 18,
        },
        {
          id: 6,
          category: "Door Staff",
          first: "Marcus",
          last: "Johnson",
          contact: "555-123-4567",
          status: "Inactive",
          shifts: 60,
          pay: 3000,
          rate: 18,
        },
        {
          id: 7,
          category: "Door Staff",
          first: "Marcus",
          last: "Johnson",
          contact: "555-123-4567",
          status: "Inactive",
          shifts: 60,
          pay: 3000,
          rate: 18,
        },
      ];
      let nextId = Math.max(...staffs.map((s) => s.id)) + 1;
      let editingId = null;

      function initials(p) {
        return ((p.first?.[0] || "") + (p.last?.[0] || "")).toUpperCase();
      }

      function statusClass(s) {
        if (s === "Upcoming") return "status-upcoming";
        if (s === "Active") return "status-active";
        return "status-inactive";
      }

      function switchCategory(cat, el) {
        document
          .querySelectorAll(".tab-item")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
        currentCategory = cat;
        render();
      }

      function getFiltered() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        return staffs.filter((p) => {
          if (p.category !== currentCategory) return false;
          const name = `${p.first} ${p.last}`.toLowerCase();
          return !q || name.includes(q) || p.contact.toLowerCase().includes(q);
        });
      }

      function render() {
        const grid = document.getElementById("cardsGrid");
        const list = getFiltered();
        if (!list.length) {
          grid.innerHTML = '<div class="empty-state">No Staff found.</div>';
          return;
        }
        grid.innerHTML = list
          .map(
            (p, i) => `
        <div class="pro-card" style="animation-delay:${Math.min(i, 10) * 0.07}s">
          <div class="card-top">
            <div class="card-top-left">
              <div class="avatar">${initials(p)}</div>
              <div class="name-block">
                <h2>${p.first} ${p.last}</h2>
                <span class="status-badge status-dull">${p.contact}</span>
              </div>
            </div>
            <div class="status-group">
              <span class="status-badge ${statusClass(p.status)}">${p.status}</span>
              <div class="actions-container">
                <button class="btn-action ms-auto" onclick="toggleActions(event, ${p.id})">
                  <span></span>
                  <span></span>
                  <span></span>
                </button>
                <div class="actions-dropdown" id="dropdown-${p.id}">
                  <div class="action-item" onclick="openEdit(${p.id})">
                    ${editIcon} Edit
                  </div>
                  <div class="action-item delete" onclick="deleteStaff(${p.id})">
                    ${delIcon} Delete
                  </div>
                </div>
              </div>
            </div>
          </div>
 
          <hr class="card-divider mt-2"/>
 
          <div class="stats-row">
            <div class="stat-item">
              <div class="stat-label">${guestsIcon} Total Shifts</div>
              <div class="stat-value">${p.shifts.toLocaleString()}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">${revenueIcon} Total Pay</div>
              <div class="stat-value">$${p.pay.toLocaleString()}</div>
            </div>
          </div>
 
          <div class="commission-bar">
            <div class="comm-icon">${medalIcon}</div>
            <span class="comm-label">Hourly Rate</span>
            <span class="comm-value">$${p.rate} / hr</span>
          </div>
        </div>
      `,
          )
          .join("");
      }

      function openModal(p = null) {
        editingId = p ? p.id : null;
        document.getElementById("modalTitle").textContent = p
          ? "Edit Staff"
          : "Add Staff";
        document.getElementById("fFirst").value = p ? p.first : "";
        document.getElementById("fLast").value = p ? p.last : "";
        document.getElementById("fContact").value = p ? p.contact : "";
        document.getElementById("fStatus").value = p ? p.status : "Upcoming";
        document.getElementById("fShifts").value = p ? p.shifts : "";
        document.getElementById("fPay").value = p ? p.pay : "";
        document.getElementById("fRate").value = p ? p.rate : "";
        document.getElementById("modalOverlay").classList.add("open");
      }
      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
        editingId = null;
      }

      document.getElementById("btnSave").addEventListener("click", () => {
        const first = document.getElementById("fFirst").value.trim();
        const last = document.getElementById("fLast").value.trim();
        const contact = document.getElementById("fContact").value.trim();
        const status = document.getElementById("fStatus").value;
        const shifts = parseInt(document.getElementById("fShifts").value) || 0;
        const pay = parseFloat(document.getElementById("fPay").value) || 0;
        const rate = parseFloat(document.getElementById("fRate").value) || 0;
        if (!first || !last) return;

        if (editingId !== null) {
          const p = staffs.find((x) => x.id === editingId);
          if (p)
            Object.assign(p, {
              first,
              last,
              contact,
              status,
              shifts,
              pay,
              rate,
            });
        } else {
          staffs.push({
            id: nextId++,
            category: currentCategory,
            first,
            last,
            contact,
            status,
            shifts,
            pay,
            rate,
          });
        }
        closeModal();
        render();
      });

      function openEdit(id) {
        closeAllDropdowns();
        openModal(staffs.find((p) => p.id === id));
      }
      function deleteStaff(id) {
        closeAllDropdowns();
        staffs = staffs.filter((p) => p.id !== id);
        render();
      }

      // ── Action Dropdown Utility ──
      function toggleActions(e, id) {
        e.stopPropagation();
        const dropdown = document.getElementById(`dropdown-${id}`);
        const isOpen = dropdown.classList.contains("open");
        closeAllDropdowns();
        if (!isOpen) dropdown.classList.add("open");
      }

      function closeAllDropdowns() {
        document.querySelectorAll(".actions-dropdown").forEach((d) => {
          d.classList.remove("open");
        });
      }

      window.addEventListener("click", () => closeAllDropdowns());

      document
        .getElementById("btnCreate")
        .addEventListener("click", () => openModal());
      document
        .getElementById("btnCancel")
        .addEventListener("click", closeModal);
      document.getElementById("modalOverlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });
      document.getElementById("searchInput").addEventListener("input", render);

      render();
    </script>
  </body>
</html>
